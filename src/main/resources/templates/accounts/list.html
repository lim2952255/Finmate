<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinMate</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>
<div class="page">
    <div th:replace="~{/layout/header :: header}"></div>

    <main class="main">
        <section class="content">
            <h1>보유계좌 목록</h1>

            <p th:if="${errorMessage != null}" th:text="${errorMessage}">
                계좌 목록 오류
            </p>

            <p th:if="${#lists.isEmpty(accounts)}">
                아직 개설된 계좌가 없습니다.
            </p>

            <table th:unless="${#lists.isEmpty(accounts)}">
                <thead>
                <tr>
                    <th>은행</th>
                    <th>계좌번호</th>
                    <th>잔액</th>
                    <th>대표계좌</th>
                    <th>이체</th>
                    <th>거래내역</th>
                    <th>설정</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="account : ${accounts}">
                    <td th:text="${account.bankCode.displayName}">신한은행</td>
                    <td th:text="${account.accountNumber}">000000-00-000000</td>
                    <td>
                        <span th:text="${#numbers.formatDecimal(account.balance, 0, 'COMMA', 0, 'POINT')}">0</span>원
                    </td>
                    <td>
                        <span th:if="${account.primary}">대표계좌</span>
                        <span th:unless="${account.primary}">-</span>
                    </td>
                    <td>
                        <a th:href="@{/accounts/transfer(from=${account.accountNumber}, fromBankCode=${account.bankCode})}">이체</a>
                    </td>
                    <td>
                        <a th:href="@{/accounts/transactions(accountNumber=${account.accountNumber}, bankCode=${account.bankCode.name()})}">거래내역</a>
                    </td>
                    <td>
                        <span th:if="${account.primary}">현재 대표계좌</span>
                        <form th:unless="${account.primary}"
                              th:action="@{/accounts/list}"
                              method="post">
                            <input type="hidden" name="primaryAccountId" th:value="${account.id}">
                            <button type="submit">대표계좌 설정</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>

            <p>
                <a th:href="@{/accounts/open}">계좌 개설</a>
                <a th:href="@{/accounts}">계좌 관리 홈</a>
            </p>
        </section>
    </main>
</div>
</body>
</html>
