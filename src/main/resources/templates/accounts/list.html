<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinMate</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>
<div class="page">
    <div th:replace="~{/layout/header :: header}"></div>

    <main class="main">
        <section class="content">
            <div class="page-heading">
                <h1>보유계좌 목록</h1>
                <p>보유 중인 일반 계좌의 잔액, 대표계좌 여부, 이체와 거래내역을 확인합니다.</p>
            </div>

            <p th:if="${errorMessage != null}" th:text="${errorMessage}">
                계좌 목록 오류
            </p>

            <p th:if="${#lists.isEmpty(accounts)}">
                아직 개설된 계좌가 없습니다.
            </p>

            <div class="table-scroll" th:unless="${#lists.isEmpty(accounts)}">
                <table class="records-table">
                    <thead>
                    <tr>
                        <th>계좌</th>
                        <th>통화</th>
                        <th>잔액</th>
                        <th>대표계좌</th>
                        <th>이체</th>
                        <th>거래내역</th>
                        <th>설정</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="account : ${accounts}">
                        <td>
                            <div class="account-cell">
                                <span class="primary-line" th:text="${account.bankCode.displayName}">신한은행</span>
                                <span class="secondary-line" th:text="${account.accountNumber}">000000-00-000000</span>
                            </div>
                        </td>
                        <td>
                            <span class="badge badge-neutral" th:text="${account.currencyCode.name()}">KRW</span>
                        </td>
                        <td class="money-cell">
                            <span th:text="${#numbers.formatDecimal(account.balance, 1, 'COMMA', account.currencyCode.fractionDigits, 'POINT')}">0</span>
                            <span th:text="${account.currencyCode.name()}">KRW</span>
                        </td>
                        <td>
                            <span class="badge badge-submitted" th:if="${account.primary}">대표계좌</span>
                            <span class="secondary-line" th:unless="${account.primary}">-</span>
                        </td>
                        <td>
                            <a th:href="@{/accounts/transfer(from=${account.accountNumber}, fromBankCode=${account.bankCode})}">이체</a>
                        </td>
                        <td>
                            <a th:href="@{/accounts/transactions(accountNumber=${account.accountNumber}, bankCode=${account.bankCode.name()})}">거래내역</a>
                        </td>
                        <td>
                            <span class="secondary-line" th:if="${account.primary}">현재 대표계좌</span>
                            <form th:unless="${account.primary}"
                                  th:action="@{/accounts/list}"
                                  method="post">
                                <input type="hidden" name="primaryAccountId" th:value="${account.id}">
                                <button type="submit">대표계좌 설정</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <p>
                <a th:href="@{/accounts/open}">계좌 개설</a>
                <a th:href="@{/accounts}">계좌 관리 홈</a>
            </p>
        </section>
    </main>
</div>
</body>
</html>
