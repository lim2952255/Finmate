<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinMate</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>
<div class="page">
    <div th:replace="~{/layout/header :: header}"></div>

    <main class="main">
        <section class="content">
            <h1>계좌 이체</h1>

            <section>
                <h2>이체 한도</h2>
                <p>
                    <!-- 일일 이체한도 표시하기 -->
                    <strong>일일 이체한도</strong>
                    <span th:text="${#numbers.formatDecimal(transferRequest.transferLimitInfo.dailyTransferLimit, 0, 'COMMA', transferRequest.currencyCode != null ? transferRequest.currencyCode.fractionDigits : 0, 'POINT')}">0</span>
                    <span th:if="${transferRequest.currencyCode != null}" th:text="${transferRequest.currencyCode.name()}">KRW</span>
                </p>
                <p>
                    <strong>오늘 이체한 금액</strong>
                    <span th:text="${#numbers.formatDecimal(transferRequest.transferLimitInfo.todayUsedTransferAmount, 0, 'COMMA', transferRequest.currencyCode != null ? transferRequest.currencyCode.fractionDigits : 0, 'POINT')}">0</span>
                    <span th:if="${transferRequest.currencyCode != null}" th:text="${transferRequest.currencyCode.name()}">KRW</span>
                </p>
                <p>
                    <strong>남은 일일 이체한도</strong>
                    <span th:text="${#numbers.formatDecimal(transferRequest.transferLimitInfo.remainingDailyTransferLimit, 0, 'COMMA', transferRequest.currencyCode != null ? transferRequest.currencyCode.fractionDigits : 0, 'POINT')}">0</span>
                    <span th:if="${transferRequest.currencyCode != null}" th:text="${transferRequest.currencyCode.name()}">KRW</span>
                </p>
                <p>
                    <strong>1회 이체한도</strong>
                    <span th:text="${#numbers.formatDecimal(transferRequest.transferLimitInfo.singleTransferLimit, 0, 'COMMA', transferRequest.currencyCode != null ? transferRequest.currencyCode.fractionDigits : 0, 'POINT')}">0</span>
                    <span th:if="${transferRequest.currencyCode != null}" th:text="${transferRequest.currencyCode.name()}">KRW</span>
                </p>
                <p>
                    <a th:href="@{/accounts/transfer-limit(accountNumber=${transferRequest.fromAccountNumber}, bankCode=${transferRequest.fromBankCode})}">
                        이체한도 변경하기
                    </a>
                </p>
            </section>

            <form th:action="@{/accounts/transfer}" th:object="${transferRequest}" method="post">
                <p th:if="${errorMessage != null}" th:text="${errorMessage}">
                    이체 오류
                </p>

                <p th:if="${#fields.hasGlobalErrors()}"
                   th:each="error : ${#fields.globalErrors()}"
                   th:text="${error}">
                    이체 오류
                </p>

                <div>
                    <strong>출금 은행</strong>
                    <span th:text="*{fromBankCode.displayName}">신한은행</span>
                    <input type="hidden" th:field="*{fromBankCode}">
                    <p th:if="${#fields.hasErrors('fromBankCode')}" th:errors="*{fromBankCode}"></p>
                </div>

                <div>
                    <strong>출금 계좌</strong>
                    <span th:text="*{fromAccountNumber}">000000-00-000000</span>
                    <input type="hidden" th:field="*{fromAccountNumber}">
                    <p th:if="${#fields.hasErrors('fromAccountNumber')}" th:errors="*{fromAccountNumber}"></p>
                </div>

                <div th:if="${transferRequest.currencyCode != null}">
                    <strong>출금 통화</strong>
                    <span th:text="${transferRequest.currencyCode.displayName}">원화</span>
                    <span th:text="${transferRequest.currencyCode.name()}">KRW</span>
                </div>

                <div>
                    <label for="toBankCode">입금 은행</label>
                    <select id="toBankCode" th:field="*{toBankCode}">
                        <option value="">은행을 선택하세요</option>
                        <option th:each="bankCode : ${bankCodes}"
                                th:value="${bankCode.name()}"
                                th:text="${bankCode.displayName}">
                            신한은행
                        </option>
                    </select>
                    <p th:if="${#fields.hasErrors('toBankCode')}" th:errors="*{toBankCode}"></p>
                </div>

                <p>
                    증권계좌로 투자금을 옮기려면
                    <a th:href="@{/accounts/transfer-investment(from=${transferRequest.fromAccountNumber}, fromBankCode=${transferRequest.fromBankCode})}">예수금 입금</a>
                    메뉴를 이용해주세요.
                </p>

                <div>
                    <label for="toAccountNumber">입금 계좌</label>
                    <input id="toAccountNumber"
                           type="text"
                           th:field="*{toAccountNumber}"
                           placeholder="000000-00-000000">
                    <p th:if="${#fields.hasErrors('toAccountNumber')}" th:errors="*{toAccountNumber}"></p>
                </div>

                <div>
                    <label for="amount">이체 금액</label>
                    <input id="amount"
                           type="number"
                           th:field="*{amount}"
                           th:min="${transferRequest.currencyCode != null ? transferRequest.currencyCode.minimumAmount : 1}"
                           th:step="${transferRequest.currencyCode != null ? transferRequest.currencyCode.inputStep : 1}">
                    <p th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></p>
                </div>

                <button type="submit">이체하기</button>
            </form>

            <p>
                <a th:href="@{/accounts/transfer-investment(from=${transferRequest.fromAccountNumber}, fromBankCode=${transferRequest.fromBankCode})}">예수금 입금</a>
                <a th:href="@{/accounts/transfer}">출금 계좌 다시 선택</a>
                <a th:href="@{/accounts}">계좌 관리 홈</a>
            </p>
        </section>
    </main>
</div>
</body>
</html>
