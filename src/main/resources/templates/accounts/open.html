<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinMate</title>
</head>
<body>
<div class="page">
    <header class="header">
        <div class="logo">FinMate</div>
        <div th:replace="~{/layout/header :: header}"></div>
    </header>

    <main class="main">
        <section class="content">
            <h1>계좌 개설</h1>
            <p>가상계좌 개설 시 초기 잔액 3,000,000원이 지급됩니다.</p>

            <form th:action="@{/accounts/open}" th:object="${openAccount}" method="post">
                <p th:if="${#fields.hasGlobalErrors()}"
                   th:each="error : ${#fields.globalErrors()}"
                   th:text="${error}">
                    계좌 개설 오류
                </p>

                <div>
                    <label for="bankCode">은행</label>
                    <select id="bankCode" th:field="*{bankCode}">
                        <option value="">은행을 선택하세요</option>
                        <option th:each="bankCode : ${bankCodes}"
                                th:value="${bankCode.name()}"
                                th:text="${bankCode.displayName}">
                            신한은행
                        </option>
                    </select>
                    <p th:if="${#fields.hasErrors('bankCode')}" th:errors="*{bankCode}"></p>
                </div>

                <div>
                    <label for="accountNumber">계좌번호</label>
                    <input id="accountNumber"
                           type="text"
                           th:field="*{accountNumber}"
                           placeholder="000000-00-000000">
                    <p th:if="${#fields.hasErrors('accountNumber')}" th:errors="*{accountNumber}"></p>
                </div>

                <div>
                    <strong>초기 잔액</strong>
                    <span>3,000,000원</span>
                </div>

                <button type="submit">계좌 개설</button>
            </form>
        </section>
    </main>
</div>
</body>
</html>
