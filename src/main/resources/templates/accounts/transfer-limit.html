<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinMate</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>
<div class="page">
    <div th:replace="~{/layout/header :: header}"></div>

    <main class="main">
        <section class="content">
            <h1>이체한도 변경</h1>

            <p th:if="${errorMessage != null}" th:text="${errorMessage}">
                이체한도 변경 오류
            </p>

            <section>
                <h2>계좌 선택</h2>
                <p th:if="${#lists.isEmpty(transferLimitPageInfo.accounts)}">
                    아직 개설된 계좌가 없습니다.
                </p>

                <table th:unless="${#lists.isEmpty(transferLimitPageInfo.accounts)}">
                    <thead>
                    <tr>
                        <th>은행</th>
                        <th>계좌번호</th>
                        <th>통화</th>
                        <th>현재 한도</th>
                        <th>선택</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="account : ${transferLimitPageInfo.accounts}">
                        <td th:text="${account.bankCode.displayName}">신한은행</td>
                        <td th:text="${account.accountNumber}">000000-00-000000</td>
                        <td th:text="${account.currencyCode.name()}">KRW</td>
                        <td>
                            일일
                            <span th:text="${#numbers.formatDecimal(account.dailyTransferLimit, 0, 'COMMA', account.currencyCode.fractionDigits, 'POINT')}">0</span>
                            <span th:text="${account.currencyCode.name()}">KRW</span> /
                            1회
                            <span th:text="${#numbers.formatDecimal(account.singleTransferLimit, 0, 'COMMA', account.currencyCode.fractionDigits, 'POINT')}">0</span>
                            <span th:text="${account.currencyCode.name()}">KRW</span>
                        </td>
                        <td>
                            <a th:href="@{/accounts/transfer-limit(accountNumber=${account.accountNumber}, bankCode=${account.bankCode})}">
                                한도 변경
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </section>

            <section th:if="${transferLimitPageInfo.selectedAccount != null}">
                <h2>현재 이체한도</h2>
                <p>
                    <strong>선택 계좌</strong>
                    <span th:text="${transferLimitPageInfo.selectedAccount.bankCode.displayName}">신한은행</span>
                    <span th:text="${transferLimitPageInfo.selectedAccount.accountNumber}">000000-00-000000</span>
                    <span th:text="${transferLimitPageInfo.selectedAccount.currencyCode.name()}">KRW</span>
                </p>
                <p>
                    <strong>일일 이체한도</strong>
                    <span th:text="${#numbers.formatDecimal(transferLimitPageInfo.transferLimitInfo.dailyTransferLimit, 0, 'COMMA', transferLimitPageInfo.selectedAccount.currencyCode.fractionDigits, 'POINT')}">0</span>
                    <span th:text="${transferLimitPageInfo.selectedAccount.currencyCode.name()}">KRW</span>
                </p>
                <p>
                    <strong>오늘 이체한 금액</strong>
                    <span th:text="${#numbers.formatDecimal(transferLimitPageInfo.transferLimitInfo.todayUsedTransferAmount, 0, 'COMMA', transferLimitPageInfo.selectedAccount.currencyCode.fractionDigits, 'POINT')}">0</span>
                    <span th:text="${transferLimitPageInfo.selectedAccount.currencyCode.name()}">KRW</span>
                </p>
                <p>
                    <strong>남은 일일 이체한도</strong>
                    <span th:text="${#numbers.formatDecimal(transferLimitPageInfo.transferLimitInfo.remainingDailyTransferLimit, 0, 'COMMA', transferLimitPageInfo.selectedAccount.currencyCode.fractionDigits, 'POINT')}">0</span>
                    <span th:text="${transferLimitPageInfo.selectedAccount.currencyCode.name()}">KRW</span>
                </p>
                <p>
                    <strong>1회 이체한도</strong>
                    <span th:text="${#numbers.formatDecimal(transferLimitPageInfo.transferLimitInfo.singleTransferLimit, 0, 'COMMA', transferLimitPageInfo.selectedAccount.currencyCode.fractionDigits, 'POINT')}">0</span>
                    <span th:text="${transferLimitPageInfo.selectedAccount.currencyCode.name()}">KRW</span>
                </p>
            </section>

            <form th:if="${transferLimitPageInfo.selectedAccount != null}" th:action="@{/accounts/transfer-limit}" method="post">
                <input type="hidden" name="accountNumber" th:value="${transferLimitPageInfo.selectedAccount.accountNumber}">
                <input type="hidden" name="bankCode" th:value="${transferLimitPageInfo.selectedAccount.bankCode}">

                <div>
                    <label for="dailyTransferLimit">새 일일 이체한도</label>
                    <input id="dailyTransferLimit"
                           name="dailyTransferLimit"
                           type="number"
                           th:min="${transferLimitPageInfo.selectedAccount.currencyCode.minimumAmount}"
                           th:step="${transferLimitPageInfo.selectedAccount.currencyCode.inputStep}">
                </div>

                <div>
                    <label for="singleTransferLimit">새 1회 이체한도</label>
                    <input id="singleTransferLimit"
                           name="singleTransferLimit"
                           type="number"
                           th:min="${transferLimitPageInfo.selectedAccount.currencyCode.minimumAmount}"
                           th:step="${transferLimitPageInfo.selectedAccount.currencyCode.inputStep}">
                </div>

                <button type="submit">이체한도 변경</button>
            </form>

            <p>
                <a th:href="@{/accounts/transfer}">계좌 이체</a>
                <a th:href="@{/accounts}">계좌 관리 홈</a>
            </p>
        </section>
    </main>
</div>
</body>
</html>
