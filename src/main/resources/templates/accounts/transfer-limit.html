<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinMate</title>
</head>
<body>
<div class="page">
    <header class="header">
        <div class="logo">FinMate</div>
        <div th:replace="~{/layout/header :: header}"></div>
    </header>

    <main class="main">
        <section class="content">
            <h1>이체한도 변경</h1>

            <p th:if="${errorMessage != null}" th:text="${errorMessage}">
                이체한도 변경 오류
            </p>

            <section>
                <h2>계좌 선택</h2>
                <p th:if="${#lists.isEmpty(accounts)}">
                    아직 개설된 계좌가 없습니다.
                </p>

                <table th:unless="${#lists.isEmpty(accounts)}">
                    <thead>
                    <tr>
                        <th>은행</th>
                        <th>계좌번호</th>
                        <th>현재 한도</th>
                        <th>선택</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="account : ${accounts}">
                        <td th:text="${account.bankCode.displayName}">신한은행</td>
                        <td th:text="${account.accountNumber}">000000-00-000000</td>
                        <td>
                            일일
                            <span th:text="${#numbers.formatDecimal(account.dailyTransferLimit, 0, 'COMMA', 0, 'POINT')}">0</span>원 /
                            1회
                            <span th:text="${#numbers.formatDecimal(account.singleTransferLimit, 0, 'COMMA', 0, 'POINT')}">0</span>원
                        </td>
                        <td>
                            <a th:href="@{/accounts/transfer-limit(accountNumber=${account.accountNumber}, bankCode=${account.bankCode})}">
                                한도 변경
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </section>

            <section th:if="${selectedAccount != null}">
                <h2>현재 이체한도</h2>
                <p>
                    <strong>선택 계좌</strong>
                    <span th:text="${selectedAccount.bankCode.displayName}">신한은행</span>
                    <span th:text="${selectedAccount.accountNumber}">000000-00-000000</span>
                </p>
                <p>
                    <strong>일일 이체한도</strong>
                    <span th:text="${#numbers.formatDecimal(dailyTransferLimit, 0, 'COMMA', 0, 'POINT')}">0</span>원
                </p>
                <p>
                    <strong>오늘 이체한 금액</strong>
                    <span th:text="${#numbers.formatDecimal(todayUsedTransferAmount, 0, 'COMMA', 0, 'POINT')}">0</span>원
                </p>
                <p>
                    <strong>남은 일일 이체한도</strong>
                    <span th:text="${#numbers.formatDecimal(remainingDailyTransferLimit, 0, 'COMMA', 0, 'POINT')}">0</span>원
                </p>
                <p>
                    <strong>1회 이체한도</strong>
                    <span th:text="${#numbers.formatDecimal(singleTransferLimit, 0, 'COMMA', 0, 'POINT')}">0</span>원
                </p>
            </section>

            <form th:if="${selectedAccount != null}" th:action="@{/accounts/transfer-limit}" method="post">
                <input type="hidden" name="accountNumber" th:value="${selectedAccount.accountNumber}">
                <input type="hidden" name="bankCode" th:value="${selectedAccount.bankCode}">

                <div>
                    <label for="dailyTransferLimit">새 일일 이체한도</label>
                    <input id="dailyTransferLimit"
                           name="dailyTransferLimit"
                           type="number"
                           min="1"
                           step="1">
                </div>

                <div>
                    <label for="singleTransferLimit">새 1회 이체한도</label>
                    <input id="singleTransferLimit"
                           name="singleTransferLimit"
                           type="number"
                           min="1"
                           step="1">
                </div>

                <button type="submit">이체한도 변경</button>
            </form>

            <p>
                <a th:href="@{/accounts/transfer}">계좌 이체</a>
                <a th:href="@{/accounts}">계좌 관리 홈</a>
            </p>
        </section>
    </main>
</div>
</body>
</html>
