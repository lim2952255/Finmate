<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinMate</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>
<div class="page">
    <div th:replace="~{/layout/header :: header}"></div>

    <main class="main">
        <section class="content">
            <h1>내 증권 계좌 / 예수금</h1>

            <p th:if="${errorMessage != null}" th:text="${errorMessage}">
                증권 계좌 목록 오류
            </p>

            <p th:if="${#lists.isEmpty(investments)}">
                아직 개설된 증권 계좌가 없습니다.
            </p>

            <table th:unless="${#lists.isEmpty(investments)}">
                <thead>
                <tr>
                    <th>증권사</th>
                    <th>계좌번호</th>
                    <th>예수금</th>
                    <th>대표계좌</th>
                    <th>투자금 이체</th>
                    <th>포트폴리오</th>
                    <th>설정</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="investment : ${investments}">
                    <td th:text="${investment.securitiesCompanyCode.displayName}">키움증권</td>
                    <td th:text="${investment.accountNumber}">000000-00-000000</td>
                    <td>
                        <span th:text="${#numbers.formatDecimal(investment.depositBalance, 0, 'COMMA', 0, 'POINT')}">0</span>원
                    </td>
                    <td>
                        <span th:if="${investment.primary}">대표계좌</span>
                        <span th:unless="${investment.primary}">-</span>
                    </td>
                    <td>
                        <a th:href="@{/investments/transfer(from=${investment.accountNumber}, fromSecuritiesCompanyCode=${investment.securitiesCompanyCode})}">이체</a>
                    </td>
                    <td>
                        <a th:href="@{/investments/portfolio(investmentAccountId=${investment.id})}">포트폴리오</a>
                    </td>
                    <td>
                        <span th:if="${investment.primary}">현재 대표계좌</span>
                        <form th:unless="${investment.primary}"
                              th:action="@{/investments/list}"
                              method="post">
                            <input type="hidden" name="primaryInvestmentId" th:value="${investment.id}">
                            <button type="submit">대표계좌 설정</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>

            <p>
                <a th:href="@{/investments/open}">증권 계좌 개설</a>
                <a th:href="@{/investments}">투자 홈</a>
            </p>
        </section>
    </main>
</div>
</body>
</html>
