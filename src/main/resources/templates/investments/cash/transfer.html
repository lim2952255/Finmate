<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinMate</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>
<div class="page">
    <div th:replace="~{/layout/header :: header}"></div>

    <main class="main">
        <section class="content">
            <h1>증권계좌 투자금 이체</h1>

            <p th:if="${errorMessage != null}" th:text="${errorMessage}">오류 메시지</p>

            <section>
                <h2>출금 증권계좌 선택</h2>

                <p th:if="${#lists.isEmpty(investmentWithdrawalPageInfo.investments)}">
                    출금에 사용할 증권 계좌가 없습니다.
                </p>
                <p th:if="${#lists.isEmpty(investmentWithdrawalPageInfo.investments)}">
                    <a th:href="@{/investments/open}">증권 계좌 개설하기</a>
                </p>

                <table th:unless="${#lists.isEmpty(investmentWithdrawalPageInfo.investments)}">
                    <thead>
                    <tr>
                        <th>증권사</th>
                        <th>계좌번호</th>
                        <th>예수금</th>
                        <th>대표계좌</th>
                        <th>이체</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="investment : ${investmentWithdrawalPageInfo.investments}">
                        <td th:text="${investment.securitiesCompanyCode.displayName}">키움증권</td>
                        <td th:text="${investment.accountNumber}">000000-00-000000</td>
                        <td>
                            <span th:text="${#numbers.formatDecimal(investment.depositBalance, 0, 'COMMA', 0, 'POINT')}">0</span>원
                        </td>
                        <td>
                            <span th:if="${investment.primary}">대표계좌</span>
                            <span th:unless="${investment.primary}">-</span>
                        </td>
                        <td>
                            <a th:href="@{/investments/transfer(from=${investment.accountNumber}, fromSecuritiesCompanyCode=${investment.securitiesCompanyCode})}">
                                이체
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </section>

            <p>
                <a th:href="@{/accounts/transfer-investment}">예수금 입금</a>
                <a th:href="@{/investments/list}">내 증권 계좌 / 예수금</a>
                <a th:href="@{/investments}">투자 홈</a>
            </p>
        </section>
    </main>
</div>
</body>
</html>
