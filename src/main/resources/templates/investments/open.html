<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinMate</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>
<div class="page">
    <div th:replace="~{/layout/header :: header}"></div>

    <main class="main">
        <section class="content">
            <h1>증권 계좌 개설</h1>
            <p>증권사를 선택하면 증권 계좌번호가 자동 발급됩니다.</p>

            <form th:action="@{/investments/open}" th:object="${openInvestment}" method="post">
                <p th:if="${#fields.hasGlobalErrors()}"
                   th:each="error : ${#fields.globalErrors()}"
                   th:text="${error}">
                    증권 계좌 개설 오류
                </p>

                <div>
                    <label for="securitiesCompanyCode">증권사</label>
                    <select id="securitiesCompanyCode" th:field="*{securitiesCompanyCode}">
                        <option value="">증권사를 선택하세요</option>
                        <option th:each="securitiesCompanyCode : ${securitiesCompanyCodes}"
                                th:value="${securitiesCompanyCode.name()}"
                                th:text="${securitiesCompanyCode.displayName}">
                            키움증권
                        </option>
                    </select>
                    <p th:if="${#fields.hasErrors('securitiesCompanyCode')}" th:errors="*{securitiesCompanyCode}"></p>
                </div>

                <div>
                    <strong>증권 계좌번호</strong>
                    <span>증권 계좌 개설 시 자동 발급</span>
                </div>

                <div>
                    <strong>초기 예수금</strong>
                    <span>0원</span>
                </div>

                <button type="submit">증권 계좌 개설</button>
            </form>

            <p>
                <a th:href="@{/investments}">투자 홈</a>
            </p>
        </section>
    </main>
</div>
</body>
</html>
