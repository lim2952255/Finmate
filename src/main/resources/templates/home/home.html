<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinMate</title>
</head>
<body>
<div class="page">
    <header class="header">
        <div class="logo">FinMate</div>
        <div th:replace="~{/layout/header :: header}"></div>
    </header>

    <main class="main">
        <section class="content">
            <div class="hero">
                <h1>금융 생활을 한곳에서 관리하세요</h1>
                <p>
                    FinMate는 계좌, 거래내역, 모의투자, 금융 뉴스 분석을 함께 다루는
                    통합 금융 플랫폼입니다.
                </p>
            </div>

            <div class="menu">
                <div class="menu-item">
                    <a th:href="@{/accounts}">계좌 관리</a>
                    <span>계좌와 거래내역 확인</span>
                </div>
                <div class="menu-item">
                    <a th:href="@{/stocks}">증권</a>
                    <span>시세와 관심종목 조회</span>
                </div>
                <div class="menu-item">
                    <a th:href="@{/portfolio}">포트폴리오</a>
                    <span>자산과 수익률 확인</span>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
