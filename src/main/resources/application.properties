spring.application.name=finmate
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/finmate?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:finmate}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:finmate-password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 엔티티 변경 사항을 DB table에 반영
spring.jpa.hibernate.ddl-auto=update
# 실행 SQL 출력
spring.jpa.show-sql=false
# SQL을 포멧에 맞춰서 출력
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace
