spring.application.name=finmate
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/finmate?serverTimezone=Asia/Seoul&useUnicode=true&characterEncoding=utf8mb4&connectionCollation=utf8mb4_unicode_ci}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:finmate}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:finmate-password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.repositories.enabled=false

# 한국투자증권 API
finmate.kis.base-url=${KIS_BASE_URL:https://openapi.koreainvestment.com:9443}
finmate.kis.app-key=${KIS_APP_KEY:}
finmate.kis.app-secret=${KIS_APP_SECRET:}
finmate.kis.request-interval-millis=${KIS_REQUEST_INTERVAL_MILLIS:700}
finmate.kis.web-socket-url=${KIS_WEBSOCKET_URL:ws://ops.koreainvestment.com:21000}
finmate.kis.web-socket-path=${KIS_WEBSOCKET_PATH:/tryitout}
finmate.kis.realtime-unsubscribe-grace-millis=${KIS_REALTIME_UNSUBSCRIBE_GRACE_MILLIS:60000}

# 종목 마스터 동기화
finmate.stock-master.domestic-sync-cron=${STOCK_MASTER_DOMESTIC_SYNC_CRON:0 0 8 * * MON-FRI}
finmate.stock-master.domestic-sync-zone=${STOCK_MASTER_DOMESTIC_SYNC_ZONE:Asia/Seoul}
finmate.stock-master.nasdaq-sync-cron=${STOCK_MASTER_NASDAQ_SYNC_CRON:0 0 8 * * MON-FRI}
finmate.stock-master.nasdaq-sync-zone=${STOCK_MASTER_NASDAQ_SYNC_ZONE:America/New_York}

# 거래량/거래대금 TOP10 캐시
finmate.stock-ranking.refresh-interval-millis=${STOCK_RANKING_REFRESH_INTERVAL_MILLIS:10000}
finmate.stock-ranking.initial-delay-millis=${STOCK_RANKING_INITIAL_DELAY_MILLIS:100}
finmate.stock-ranking.open-cache-ttl-seconds=${STOCK_RANKING_OPEN_CACHE_TTL_SECONDS:30}
finmate.stock-ranking.closed-cache-ttl-seconds=${STOCK_RANKING_CLOSED_CACHE_TTL_SECONDS:86400}

# 엔티티 변경 사항을 DB table에 반영
spring.jpa.hibernate.ddl-auto=update
# 실행 SQL 출력
spring.jpa.show-sql=false
# SQL을 포멧에 맞춰서 출력
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace
