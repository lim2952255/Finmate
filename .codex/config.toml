# oh-my-codex top-level settings (must be before any [table])
model_reasoning_effort = "medium"
developer_instructions = "Handle ordinary project work directly with Codex. Run OMX workflows only when the user explicitly invokes a dollar-prefixed skill. Native agents and explicit OMX skills remain available when requested or useful within those boundaries."
model = "gpt-5.6-sol"

[features]
multi_agent = true
child_agents_md = true
hooks = false
goals = true

[shell_environment_policy.set]
USE_OMX_EXPLORE_CMD = "0"

[agents]
max_threads = 6
max_depth = 2

# ============================================================
# oh-my-codex (OMX) Configuration
# Managed by omx setup - manual edits preserved on next setup
# ============================================================

# OMX TUI StatusLine (Codex CLI v0.101.0+)
[tui]
# omx:managed-status-line
status_line = ["model-with-reasoning", "git-branch", "context-remaining", "total-input-tokens", "total-output-tokens", "five-hour-limit", "weekly-limit"]

# ============================================================
# End oh-my-codex
